name: CI — Build & Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ak3hay
  WEB_IMAGE: ak3hay/preso-web
  PYTHON_AGENT_IMAGE: ak3hay/preso-python-agent
  NODE_WORKER_IMAGE: ak3hay/preso-node-worker

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & Push — Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-python-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & Push — Python Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: workers/python-agent/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.PYTHON_AGENT_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.PYTHON_AGENT_IMAGE }}:latest
          cache-from: type=gha,scope=python
          cache-to: type=gha,mode=max,scope=python

  build-node-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & Push — Node Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: workers/node-worker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.NODE_WORKER_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.NODE_WORKER_IMAGE }}:latest
          cache-from: type=gha,scope=node
          cache-to: type=gha,mode=max,scope=node

  update-manifests:
    runs-on: ubuntu-latest
    needs: [build-web, build-python-agent, build-node-worker]
    if: github.event_name == 'push'
    steps:
      - name: Update K8s Manifests
        env:
          MANIFESTS_PAT: ${{ secrets.MANIFESTS_PAT }}
        run: |
          TAG=${GITHUB_SHA::8}
          REPO_URL="https://x-access-token:${MANIFESTS_PAT}@github.com/akshay-eng/PresoAI_Manifests.git"

          git clone "$REPO_URL" manifests
          cd manifests

          sed -i "s|newTag:.*|newTag: \"$TAG\"|g" overlays/dev/kustomization.yaml
          sed -i "s|newTag:.*|newTag: \"$TAG\"|g" overlays/prod/kustomization.yaml

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no manifest changes"
            exit 0
          fi
          git commit -m "chore: update image tags to $TAG"
          git push "$REPO_URL" HEAD:main
