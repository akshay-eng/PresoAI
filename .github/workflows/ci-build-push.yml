name: CI — Build & Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ak3hay
  WEB_IMAGE: ak3hay/preso-web
  PYTHON_AGENT_IMAGE: ak3hay/preso-python-agent
  NODE_WORKER_IMAGE: ak3hay/preso-node-worker
  PPTX_AGENT_IMAGE: ak3hay/preso-pptx-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        id: tag
        run: |
          TAG=${GITHUB_SHA::8}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building with tag: $TAG"

      # Build Next.js Web App
      - name: Build & Push — Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Python Agent
      - name: Build & Push — Python Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: workers/python-agent/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.PYTHON_AGENT_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.PYTHON_AGENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Node Worker
      - name: Build & Push — Node Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: workers/node-worker/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.NODE_WORKER_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.NODE_WORKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Update manifests repo with new image tags
      - name: Update K8s Manifests
        if: github.event_name == 'push'
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          git clone https://${{ secrets.MANIFESTS_PAT }}@github.com/akshay-eng/PresoAI_Manifests.git manifests
          cd manifests

          # Update image tags in kustomization
          sed -i "s|newTag:.*|newTag: $TAG|g" overlays/dev/kustomization.yaml
          sed -i "s|newTag:.*|newTag: $TAG|g" overlays/prod/kustomization.yaml

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update image tags to $TAG [skip ci]"
          git push
