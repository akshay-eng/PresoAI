services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  node-worker:
    build:
      context: .
      dockerfile: workers/node-worker/Dockerfile
      target: runner
    restart: unless-stopped
    env_file:
      - ./workers/node-worker/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  python-agent:
    build:
      context: .
      dockerfile: workers/python-agent/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./workers/python-agent/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Remote MCP server. Wraps the v1 REST API as MCP tools so Claude Desktop,
  # Cursor, n8n and other agent runtimes can drive deck generation. Auth is
  # via the same psf_… bearer keys minted at /settings → Developer.
  mcp-server:
    build:
      context: .
      dockerfile: workers/mcp-server/Dockerfile
      target: runner
    restart: unless-stopped
    ports:
      - "8200:8200"
    env_file:
      - ./workers/mcp-server/.env.production
    environment:
      # Defaults; override via .env.production if needed.
      MCP_PORT: "8200"
      MCP_HOST: "0.0.0.0"
      MCP_ENDPOINT: "/mcp"
      # Inside the compose network, the web service is reachable by name.
      PRESO_API_BASE_URL: "http://web:3000"
    depends_on:
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8200/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
