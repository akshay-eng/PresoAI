services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: slideforge
      POSTGRES_PASSWORD: slideforge_dev
      POSTGRES_DB: slideforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slideforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/slideforge --ignore-existing;
      mc anonymous set download local/slideforge/public;
      exit 0;
      "

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://slideforge:slideforge_dev@postgres:5432/slideforge
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_NAME: slideforge
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      MINIO_ENDPOINT: http://minio:9000
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  node-worker:
    build:
      context: .
      dockerfile: workers/node-worker/Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://slideforge:slideforge_dev@postgres:5432/slideforge
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_NAME: slideforge
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      NODE_WORKER_CONCURRENCY: "5"
      LIBREOFFICE_PATH: /usr/bin/libreoffice
    volumes:
      - ./workers/node-worker:/app/workers/node-worker
      - ./packages:/app/packages
      - /app/workers/node-worker/node_modules
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  python-agent:
    build:
      context: .
      dockerfile: workers/python-agent/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://slideforge:slideforge_dev@postgres:5432/slideforge
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_NAME: slideforge
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      PYTHON_WORKER_CONCURRENCY: "4"
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    volumes:
      - ./workers/python-agent:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  onlyoffice:
    image: onlyoffice/documentserver
    restart: unless-stopped
    ports:
      - "8443:80"
    environment:
      JWT_ENABLED: "false"
      ALLOW_PRIVATE_IP_ADDRESS: "true"
      ALLOW_META_IP_ADDRESS: "true"
    volumes:
      - onlyoffice_data:/var/lib/onlyoffice

  collabora:
    image: collabora/code
    restart: unless-stopped
    ports:
      - "9980:9980"
    environment:
      extra_params: "--o:ssl.enable=false --o:net.post_allow.host[0]=.* --o:net.proto=IPv4 --o:net.listen=any"
      aliasgroup1: "http://host.docker.internal:3000"
      server_name: "localhost"
      DONT_GEN_SSL_CERT: "1"
    cap_add:
      - MKNOD

  # Nginx reverse proxy to serve Collabora on port 80 (avoids port mismatch in WebSocket URLs)
  collabora-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./collabora-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - collabora

volumes:
  postgres_data:
  redis_data:
  minio_data:
  onlyoffice_data:
